<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IITP Task-Master</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #f0f2f5; 
            margin-top: 50px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-block;
            min-width: 450px;
        }
        h1 { color: #1a73e8; margin-bottom: 25px; }
        .input-group { margin-bottom: 25px; display: flex; gap: 10px; justify-content: center; }
        input { 
            padding: 12px; 
            width: 250px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px;
            outline: none;
        }
        .add-btn { 
            padding: 12px 20px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: bold;
        }
        #task-list { list-style: none; padding: 0; margin-top: 20px; }
        .task-item { 
            background: #ffffff; 
            margin: 12px 0; 
            padding: 15px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .task-info { text-align: left; }
        .task-text { font-weight: 600; color: #333; display: block; }
        .task-time { font-size: 0.75rem; color: #888; margin-top: 4px; display: block; }
        .delete-btn { 
            background: #fee2e2;
            color: #ef4444; 
            border: none; 
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
.completed {
    text-decoration: line-through;
    color: #bbb !important;
}
.checkbox {
    margin-right: 15px;
    transform: scale(1.2);
    cursor: pointer;
}
    </style>
</head>
<body>

<div class="container">
    <h1>IITP Task-Master</h1>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <button class="add-btn" onclick="addTask()">Add Task</button>
    </div>
    <ul id="task-list"></ul>
</div>

<script>
    window.onload = fetchTasks;

    // Helper to format the Unix timestamp from Python
    function formatDate(timestamp) {
        if (!timestamp) return "";
        const date = new Date(timestamp * 1000);
        return date.toLocaleString('en-IN', { 
            day: 'numeric', 
            month: 'short', 
            hour: '2-digit', 
            minute: '2-digit' 
        });
    }

    async function fetchTasks() {
        try {
            const response = await fetch('/tasks');
            const data = await response.json();
            const list = document.getElementById('task-list');
            list.innerHTML = ''; 
            
            data.tasks.forEach(taskObj => {
                // Safety: handle old plain strings or new objects
                const text = taskObj.task || taskObj;
                const timeStr = taskObj.id ? formatDate(taskObj.id) : "Original Task";

                list.innerHTML += `
                    <li class="task-item">
                        <div class="task-info">
                            <span class="task-text">${text}</span>
                            <span class="task-time">📅 ${timeStr}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteTask('${text}')">Delete</button>
                    </li>`;
            });
        } catch (e) { console.error("Fetch failed", e); }
    }

    async function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();
        if (!text) return;

        await fetch('/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task: text })
        });

        input.value = ''; 
        fetchTasks();
    }

    async function deleteTask(taskName) {
        await fetch('/tasks', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task: taskName })
        });
        fetchTasks();
    }
</script>

</body>
</html>
