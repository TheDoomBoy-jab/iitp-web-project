!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IITP Task-Master</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #f0f2f5; 
            margin-top: 50px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-block;
            min-width: 400px;
        }
        h1 { color: #1a73e8; margin-bottom: 25px; }
        .input-group { margin-bottom: 25px; display: flex; gap: 10px; justify-content: center; }
        input { 
            padding: 12px; 
            width: 250px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #1a73e8; }
        .add-btn { 
            padding: 12px 20px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: bold;
        }
        .add-btn:hover { background: #1557b0; }
        #task-list { list-style: none; padding: 0; margin-top: 20px; }
        .task-item { 
            background: #ffffff; 
            margin: 10px 0; 
            padding: 15px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .delete-btn { 
            background: #fee2e2;
            color: #ef4444; 
            border: none; 
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .delete-btn:hover { background: #fecaca; }
    </style>
</head>
<body>

<div class="container">
    <h1>IITP Task-Master</h1>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="What's on your mind?">
        <button class="add-btn" onclick="addTask()">Add Task</button>
    </div>
    <ul id="task-list"></ul>
</div>

<script>
    // 1. Load tasks as soon as the page opens
    window.onload = fetchTasks;

    async function fetchTasks() {
        try {
            const response = await fetch('/tasks');
            const data = await response.json();
            const list = document.getElementById('task-list');
            list.innerHTML = ''; 
            
            data.tasks.forEach(taskObj => {
                // IMPORTANT: We use taskObj.task because the backend 
                // now sends a JSON object: {"id": 123, "task": "text"}
                list.innerHTML += `
                    <li class="task-item">
                        <span>${taskObj.task}</span>
                        <button class="delete-btn" onclick="deleteTask('${taskObj.task}')">Delete</button>
                    </li>`;
            });
        } catch (error) {
            console.error("Error fetching tasks:", error);
        }
    }
function formatTime(timestamp) {
    const date = new Date(timestamp * 1000); // Multiply by 1000 to get milliseconds
    return date.toLocaleString(); // Returns a readable string
}
    async function addTask() {
        const input = document.getElementById('taskInput');
        const taskText = input.value.trim();
        if (!taskText) return;

        await fetch('/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task: taskText })
        });

        input.value = ''; 
        fetchTasks(); // Refresh UI
    }

    async function deleteTask(taskName) {
        // We send the task name back so Python can find and remove it
        await fetch('/tasks', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task: taskName })
        });
        
        fetchTasks(); // Refresh UI
    }
</script>

</body>
</html>
